  <Main>
    <section>
      <h1>Contacto</h1>
      <h2>Envianos tu mensaje</h2>

      <form>
        <div class="fieldset">
          <fieldset>
            <legend>Datos personales</legend>
            <div><label for="name">Nombre</label></div>
            <div><input type="text" id="name" required></div>
            <div><label for="surname">Apellido</label></div>
            <div><input type="text" id="surname" required></div>
            <div><label for="mail">Correo electrónico</label></div>
            <div><input type="email" id="mail" required></div>

            <div><label for="Asunto">Asunto:</label></div>
            <div><input type="Asunto" id="Asunto" name="Asunto" required></div>

            <div><label for="mensaje">Mensaje:</label></div>
            <div><textarea id="mensaje" name="mensaje" rows="4" required></textarea></div>

            <div><button type="submit">Enviar</button></div>

        </div>
      </form>
      </fieldset>

    </section>
  </Main>
